
name: "🔬Task – Testen"
description: "Testtask voor het voorbereiden, uitvoeren en documenteren van softwaretests"
title: "[TASK]: Test - "
labels: ["Testing"]

body:
  - type: markdown
    attributes:
      value: |
        ### Richtlijn
        - Deze task is een **subtaak van een User Story** en **wordt altijd als sub‑issue aangemaakt**.
        - Deze task beschrijft **vooraf** wat en waarom er getest gaat worden.
        - De uitvoering en vastlegging gebeuren met:
          - het **[Excel Software Testsheet](https://lumiad.sharepoint.com/:x:/r/sites/development/Gedeelde%20documenten/General/3.%20Document%20templates/20260114_LXT_SoftwareTestSheet_Template.xlsx?d=w893fdbbc91784df9a1a6964d81f40896&csf=1&web=1&e=lNNCtU)**
          - en het **[Word Testrapport](https://lumiad.sharepoint.com/:w:/r/sites/development/Gedeelde%20documenten/General/3.%20Document%20templates/20260108_LXT_Testrapport_Template.docx?d=w80cdcb21d56a41df9a91273bbe8c260b&csf=1&web=1&e=C5CiMS)**

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: test-doel
    attributes:
      label: "• Testdoel"
      description: Waarom wordt deze test uitgevoerd? Wat wil je aantonen of uitsluiten?
      placeholder: |
        Doel van deze test:
        - Valideren dat …
        - Aantonen dat …
        - Controleren of …
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: test-scope
    attributes:
      label: "• Testscope"
      description: Wat valt wel en niet binnen deze test?
      placeholder: |
        Binnen scope:
        - Functionaliteit / component:
        - Scenario’s:

        Buiten scope:
        - …
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: test-type
    attributes:
      label: "• Type tests"
      description: Welke testsoorten worden naar verwachting uitgevoerd?
      placeholder: |
        Verwachte testtypes:
        - Functional
        - Integration
        - Security
        - Performance
        - User Interface
        - Regression
        - Compliance
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: test-aanpak
    attributes:
      label: "• Testaanpak"
      description: Hoe ga je deze test ongeveer uitvoeren?
      placeholder: |
        Testaanpak:
        - Handmatig / geautomatiseerd
        - Benodigde setup of configuratie
        - Aannames of randvoorwaarden
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: verwacht-resultaat
    attributes:
      label: "• Verwacht Resultaat"
      description: Wat verwacht je dat de test aantoont als alles correct werkt?
      placeholder: |
        Verwachting:
        - Het systeem …
        - De functionaliteit …
        - Er treden geen …
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: done-criteria
    attributes:
      label: "• Done Criteria"
      description: Wanneer is deze testtask afgerond?
      placeholder: |
        - [ ] Testcases zijn aangemaakt en/of ingevuld in het Excel Software Testsheet
        - [ ] Tests zijn uitgevoerd volgens de beschreven aanpak
        - [ ] Resultaten en conclusies zijn vastgelegd
        - [ ] Word Testrapport is bijgewerkt
    validations:
      required: true
