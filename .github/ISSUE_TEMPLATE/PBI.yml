
name: "User Story"
description: "User Story voor software development"
title: "[US]: "
type: "User Story"

body:
  - type: markdown
    attributes:
      value: |
        ### Richtlijn
        - Houd de titel kort en actiegericht.
        - Beschrijf de *waarde* van de story, niet de oplossing.
        - Acceptance Criteria bepalen wanneer deze story **Done** is.

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: description
    attributes:
      label: "• User Story"
      description: Beschrijf de user story in het verplichte *Als / wil ik / zodat*-format.
      placeholder: |
        Als [type gebruiker / rol]
        wil ik [functionaliteit of gedrag]
        zodat [waarde / doel].
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: designs-context
    attributes:
      label: "• Designs & Context (optioneel)"
      description: UI-designs, technische context, afhankelijkheden of links ter ondersteuning.
      placeholder: |
        - Design / mockup (C4, flowchart, sequence diagram, etc.):
        - Technische context / aannames:
        - Afhankelijkheden:
        - Links (ADR, documentatie, andere issues):
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "• Acceptance Criteria"
      description: |
        Concreet, toetsbaar en uitbreidbaar.
        Elke regel is een checklist-item.
        Gebruik bij voorkeur Given / When / Then.
      placeholder: |
        - [ ] Given ...
              When ...
              Then ...

        - [ ] Given ...
              When ...
              Then ...
    validations:
      required: true
