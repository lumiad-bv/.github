name: 🐛 Bug Report
description: Report a bug to help us improve FastAPI
title: "🐛 [BUG] <short description>"
labels:
  - bug
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
        > ⚠️ Before submitting, please search [existing issues](../../issues) to avoid duplicates.

  - type: dropdown
    id: environment
    attributes:
      label: 🌍 Environment
      description: Which environment did you encounter this bug in?
      options:
        - "🧑‍💻 DEV — Development"
        - "🧪 TEST — Testing"
        - "🔎 UAT — User Acceptance Testing"
        - "🚀 PRD — Production"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: 📝 Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 🔁 Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Call endpoint '...'
        3. Send payload '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: ✅ Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: ❌ Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: minimal-example
    attributes:
      label: 🧩 Minimal Reproducible Example
      description: Paste a minimal code snippet that reproduces the issue.
      render: python
      placeholder: |
        # Paste a minimal code snippet that reproduces the issue

  - type: input
    id: fastapi-version
    attributes:
      label: ⚡ FastAPI Version
      placeholder: "e.g. 0.110.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: 🐍 Python Version
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 💻 Operating System
      placeholder: "e.g. Ubuntu 22.04 / Windows 11 / macOS 14"
    validations:
      required: true

  - type: input
    id: pydantic-version
    attributes:
      label: 🔷 Pydantic Version
      placeholder: "e.g. 2.6.0"

  - type: input
    id: uvicorn-version
    attributes:
      label: 🦄 Uvicorn / Starlette Version
      placeholder: "e.g. 0.29.0"

  - type: textarea
    id: traceback
    attributes:
      label: 🔴 Error Output / Traceback
      description: Paste the full traceback or error message here.
      render: shell
      placeholder: Paste the full traceback or error message here

  - type: textarea
    id: additional-context
    attributes:
      label: 💬 Additional Context
      description: Add any other context, screenshots, or logs about the problem here.
