name: Product Backlog Item
description: Nieuwe user story / PBI
title: "[PBI]: "
type: User Story
body:
  - type: markdown
    attributes:
      value: |
        ## Product Backlog Item
        Gebruik dit formulier om een nieuwe User Story aan te maken.

  - type: textarea
    id: story
    attributes:
      label: User story
      description: Beschrijf de user story
      placeholder: |
        Als <rol>
        wil ik <functionaliteit>
        zodat <waarde/doel>
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context / achtergrond
      description: Extra informatie of randvoorwaarden
    validations:
      required: false

  - type: checkboxes
    id: definition_of_done
    attributes:
      label: Definition of Done
      description: Deze punten moeten voldaan zijn voordat de story "Done" is
      options:
        - label: Acceptatiecriteria zijn duidelijk en volledig
          required: true
        - label: Oplossing is geïmplementeerd en werkt volgens verwachting
          required: false
        - label: Tests zijn geschreven en succesvol uitgevoerd
          required: false
        - label: Code is gereviewd (PR goedgekeurd)
          required: false
        - label: Documentatie is bijgewerkt indien nodig
          required: false
        - label: Geen bekende openstaande bugs of regressies
          required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptatiecriteria
      placeholder: |
        - Gegeven ...
        - Als ...
        - Dan ...
    validations:
      required: true
